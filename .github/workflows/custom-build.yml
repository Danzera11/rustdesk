name: Build Personalizado do RustDesk para Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    # 1. Checkout do código e dos submódulos (vcpkg, etc.)
    - name: Checkout do código com submódulos
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    # 2. Instalar Rust
    - name: Instalar Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true

    # 3. Cache do Cargo para acelerar builds futuros
    - name: Configurar cache do Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    # 4. Preparar o ambiente de compilação do Windows (MSVC)
    # Necessário para que o script do vcpkg possa compilar as bibliotecas C++.
    - name: Instalar ambiente de compilação MSVC
      uses: ilammy/msvc-dev-cmd@v1

    # 5. Instalar dependências C++ (Opus, etc.) da forma correta
    # Executa o script que está DENTRO do submódulo vcpkg, instalando as libs no lugar certo.
    - name: Instalar dependências via script do repositório
      run: |
        cd vcpkg
        ./bootstrap-vcpkg.bat -disableMetrics
      shell: pwsh

    # 6. Compilar o RustDesk
    # O Cargo agora encontrará as dependências em './vcpkg/installed/...'
    - name: Compilar o RustDesk com personalizações
      env:
        RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
        RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
      run: cargo build --release --verbose

    # 7. Fazer o upload do executável final
    - name: Fazer upload do executável como artefato
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-windows-personalizado
        path: target/release/rustdesk.exe
