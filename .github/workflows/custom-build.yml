name: Build Personalizado do RustDesk para Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    # 1. Checkout do código principal.
    - name: Checkout do código
      uses: actions/checkout@v4

    # 2. Forçar o download dos submódulos (vcpkg, etc.)
    # Este é o passo crucial que estava falhando silenciosamente antes.
    - name: Inicializar e atualizar submódulos
      run: git submodule update --init --recursive
      shell: pwsh

    # 3. Instalar Rust
    - name: Instalar Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true

    # 4. Cache do Cargo
    - name: Configurar cache do Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    # 5. Preparar ambiente de compilação C++
    - name: Instalar ambiente de compilação MSVC
      uses: ilammy/msvc-dev-cmd@v1

    # 6. Instalar dependências C++ (Opus, etc.) usando o script do repositório
    # Agora que garantimos que a pasta 'vcpkg' existe, este passo vai funcionar.
    - name: Instalar dependências via script do repositório
      run: |
        cd vcpkg
        ./bootstrap-vcpkg.bat -disableMetrics
      shell: pwsh

    # 7. Compilar o RustDesk
    - name: Compilar o RustDesk com personalizações
      env:
        RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
        RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
      run: cargo build --release --verbose

    # 8. Fazer o upload do executável
    - name: Fazer upload do executável como artefato
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-windows-personalizado
        path: target/release/rustdesk.exe
