name: Build Personalizado do RustDesk para Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Configurar cache do Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    # Passo crucial corrigido:
    - name: Instalar dependências C++ (libyuv e opus) via vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        # Adicionamos esta linha para dizer ao vcpkg exatamente o que instalar.
        # O RustDesk precisa de 'libyuv' para vídeo e 'opus' para áudio.
        vcpkgTriplet: 'x64-windows-static'
        vcpkgArguments: 'libyuv opus'

    - name: Instalar Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true

    - name: Compilar o RustDesk
      env:
        # Esta variável de ambiente é necessária para que o Cargo encontre as libs do vcpkg
        VCPKG_ROOT: ${{ env.VCPKG_ROOT }}
        RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
        RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
      run: cargo build --release --verbose

    - name: Fazer upload do executável como artefato
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-windows-personalizado
        path: target/release/rustdesk.exe
