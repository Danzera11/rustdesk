name: Build Personalizado do RustDesk para Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout do código-fonte
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Instalar Rust (toolchain stable)
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true

    - name: Configurar cache do Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Instalar LLVM (necessário para o ambiente de compilação)
      uses: ilammy/msvc-dev-cmd@v1

    - name: Instalar dependências do vcpkg (Método Corrigido)
      # Executa o script de bootstrap do vcpkg que já vem com o RustDesk.
      # Usamos pwsh para consistência e combinamos os comandos.
      run: |
        cd vcpkg
        ./bootstrap-vcpkg.bat -disableMetrics
      shell: pwsh

    - name: Compilar o RustDesk com personalizações
      env:
        RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
        RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
      run: cargo build --release --verbose
      shell: pwsh

    - name: Fazer upload do executável como artefato
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-windows-personalizado
        path: target/release/rustdesk.exe
