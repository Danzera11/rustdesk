name: Build Personalizado do RustDesk para Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    # Passo 1: Clonar o repositório manualmente (Abordagem mais robusta)
    # Em vez de usar actions/checkout, clonamos diretamente com a opção --recurse-submodules.
    # Isso garante que o vcpkg e outras dependências sejam baixados.
    - name: Clonar repositório e submódulos
      run: |
        git clone --recurse-submodules https://github.com/${{ github.repository }} .
      shell: pwsh

    # Passo 2: Instalar Rust
    - name: Instalar Rust (toolchain stable )
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true

    # Passo 3: Configurar cache do Cargo (Opcional, mas recomendado)
    - name: Configurar cache do Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    # Passo 4: Preparar o ambiente de compilação do Windows
    - name: Instalar LLVM e ambiente de compilação MSVC
      uses: ilammy/msvc-dev-cmd@v1

    # Passo 5: Instalar as dependências C++ via vcpkg
    - name: Instalar dependências do vcpkg
      # Este passo agora deve encontrar a pasta 'vcpkg' sem problemas.
      run: |
        cd vcpkg
        ./bootstrap-vcpkg.bat -disableMetrics
      shell: pwsh

    # Passo 6: Compilar o projeto Rust
    - name: Compilar o RustDesk com personalizações
      env:
        RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
        RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
      run: cargo build --release --verbose
      shell: pwsh

    # Passo 7: Fazer o upload do resultado
    - name: Fazer upload do executável como artefato
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-windows-personalizado
        path: target/release/rustdesk.exe
