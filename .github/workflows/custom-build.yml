name: Build Personalizado do RustDesk para Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    # 1. Checkout do SEU código (sem depender de submódulos)
    - name: Checkout do código principal
      uses: actions/checkout@v4

    # 2. FORÇAR A CRIAÇÃO DA PASTA VCPKG
    # Se o submódulo não funciona, nós clonamos o vcpkg manualmente para a pasta 'vcpkg'.
    # O RustDesk usa um fork específico do vcpkg, então clonamos esse fork.
    - name: Clonar VCPKG manualmente no diretório esperado
      run: git clone https://github.com/microsoft/vcpkg.git vcpkg
      shell: pwsh

    # 3. DIAGNÓSTICO OBRIGATÓRIO
    # Este passo vai nos provar que a pasta vcpkg agora existe.
    - name: Verificar a estrutura de arquivos
      run: ls -l
      shell: pwsh

    # 4. Instalar Rust
    - name: Instalar Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true

    # 5. Preparar ambiente de compilação C++
    - name: Instalar ambiente de compilação MSVC
      uses: ilammy/msvc-dev-cmd@v1

    # 6. Instalar dependências C++ (Opus, etc. )
    # Agora que a pasta 'vcpkg' foi criada manualmente, este passo TEM que funcionar.
    - name: Instalar dependências via script do repositório
      run: |
        cd vcpkg
        ./bootstrap-vcpkg.bat -disableMetrics
      shell: pwsh

    # 7. Compilar o RustDesk
    - name: Compilar o RustDesk com personalizações
      env:
        RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
        RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
      run: cargo build --release --verbose

    # 8. Fazer o upload do executável
    - name: Fazer upload do executável como artefato
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-windows-personalizado
        path: target/release/rustdesk.exe
