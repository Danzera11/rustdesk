name: Build Personalizado do RustDesk para Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    # Passo 1: Usar a ação de checkout padrão.
    # Vamos voltar à forma mais simples e confiável, que cria o checkout no diretório raiz.
    - name: Checkout do código-fonte com submódulos
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    # Passo 2 (Diagnóstico): Listar o conteúdo para ter certeza absoluta.
    - name: Verificar se a pasta vcpkg existe na raiz
      run: |
        echo "Listando o conteúdo do diretório de trabalho:"
        ls -R .
      shell: pwsh

    # Passo 3: Instalar Rust
    - name: Instalar Rust (toolchain stable)
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true

    # Passo 4: Configurar cache do Cargo
    - name: Configurar cache do Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    # Passo 5: Preparar o ambiente de compilação do Windows
    - name: Instalar LLVM e ambiente de compilação MSVC
      uses: ilammy/msvc-dev-cmd@v1

    # Passo 6: Instalar as dependências C++ via vcpkg
    - name: Instalar dependências do vcpkg
      # Agora, este comando será executado na raiz do projeto, onde 'vcpkg' realmente está.
      run: |
        cd vcpkg
        ./bootstrap-vcpkg.bat -disableMetrics
      shell: pwsh

    # Passo 7: Compilar o projeto Rust
    - name: Compilar o RustDesk com personalizações
      env:
        RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
        RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
      run: cargo build --release --verbose
      shell: pwsh

    # Passo 8: Fazer o upload do resultado
    - name: Fazer upload do executável como artefato
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-windows-personalizado
        path: target/release/rustdesk.exe
