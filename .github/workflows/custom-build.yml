name: Build Personalizado do RustDesk para Windows

on:
  workflow_dispatch: # Permite acionar a build manualmente

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout do código-fonte
      uses: actions/checkout@v4
      with:
        # 'recursive' é essencial para baixar os submódulos do RustDesk
        submodules: 'recursive'

    - name: Instalar Rust (toolchain stable)
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true

    - name: Configurar cache do Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Instalar LLVM (necessário para vcpkg e bindgen)
      uses: ilammy/msvc-dev-cmd@v1

    - name: Instalar vcpkg e suas dependências
      # O RustDesk usa seu próprio script para gerenciar o vcpkg
      run: |
        cd vcpkg
        ./bootstrap-vcpkg.bat
      shell: cmd

    - name: Compilar o RustDesk com personalizações
      # Passamos as variáveis de ambiente diretamente para o comando do cargo
      # Isso garante que o compilador as utilize durante a build
      env:
        # Seus segredos do GitHub para o servidor e a chave pública
        RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
        RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
      run: cargo build --release --verbose

    - name: Fazer upload do executável como artefato
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-windows-personalizado
        path: target/release/rustdesk.exe
