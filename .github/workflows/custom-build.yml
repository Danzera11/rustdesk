name: Build Personalizado do RustDesk para Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    # 1. Checkout do código (Sua base, perfeita)
    - name: Checkout do código com submódulos
      uses: actions/checkout@v4 # Atualizado para a v4, a mais recente
      with:
        submodules: 'recursive'

    # 2. Instalar Rust (Sua base, perfeita)
    - name: Instalar Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true

    # 3. Cache do Cargo (Sua base, perfeita)
    - name: Configurar cache do Cargo
      uses: actions/cache@v4 # Atualizado para a v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    # 4. Preparar ambiente de compilação C++ (Passo que faltava)
    # Instala as ferramentas do Visual Studio (compilador C++, LLVM) necessárias para o vcpkg.
    - name: Instalar LLVM e ambiente de compilação MSVC
      uses: ilammy/msvc-dev-cmd@v1

    # 5. Instalar dependências via vcpkg (Passo que faltava)
    # Executa o script do próprio RustDesk para baixar e compilar as libs C++.
    - name: Instalar dependências do vcpkg
      run: |
        cd vcpkg
        ./bootstrap-vcpkg.bat -disableMetrics
      shell: pwsh

    # 6. Compilar o RustDesk (Comando corrigido)
    # Usamos 'cargo build' para apenas compilar, não executar.
    - name: Compilar o RustDesk com personalizações
      env:
        RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
        RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
      run: cargo build --release --verbose

    # 7. Upload do artefato (Sua base, perfeita)
    - name: Fazer upload do executável como artefato
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-windows-personalizado
        path: target/release/rustdesk.exe
