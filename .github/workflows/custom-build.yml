name: Build Personalizado do RustDesk para Windows

on:
  workflow_dispatch:

env:
  # Define o caminho do vcpkg para todos os passos do job
  VCPKG_ROOT: ${{ runner.temp }}/vcpkg

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Configurar cache do Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Instalar e configurar vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        # Instala o vcpkg no diretório que definimos em VCPKG_ROOT
        vcpkgDirectory: ${{ env.VCPKG_ROOT }}
        # Especifica um commit estável do vcpkg para evitar surpresas
        vcpkgGitCommitId: '8f7f44a735903b135e700015c86b89e2b2b13f89'

    - name: Instalar dependências (opus e libyuv)
      run: |
        ${{ env.VCPKG_ROOT }}/vcpkg.exe install opus:x64-windows libyuv:x64-windows
      shell: pwsh

    - name: Instalar Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable

    - name: Compilar o RustDesk
      env:
        RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
        RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
      run: cargo build --release --verbose

    - name: Fazer upload do executável como artefato
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-windows-personalizado
        path: target/release/rustdesk.exe
